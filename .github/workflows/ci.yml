name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      packages: read  # Added permission for packages

    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bash coreutils tar xz-utils curl ca-certificates make gcc g++ \
            binutils file pkg-config libssl-dev python3 python3-pip \
            python3-setuptools python3-wheel python3-venv \
            python3-dev libffi-dev libgmp-dev libbz2-dev liblzma-dev \
            libcap-dev libgcrypt20-dev libgmpxx4ldbl \
            libcurl4-openssl-dev libjson-c-dev \
            libglib2.0-dev libgtest-dev libgmp-dev \
            libboost-dev libboost-system-dev libboost-filesystem-dev \
            libboost-thread-dev libboost-regex-dev  # Added missing dependencies

      - name: Ensure make is installed
        run: sudo apt-get install -y make  # Ensure make is installed

      - name: Run tests
        run: make check

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y --no-install-recommends shellcheck

      - name: Lint shell scripts
        # make lint runs the same per-file shellcheck invocation used locally,
        # keeping CI and the developer workflow in sync.
        run: make lint

  remix-dry-run:
    name: lkf remix --dry-run
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Verify remix.toml parses cleanly
        # Run through the real lkf.sh entry point so the full module-load
        # path is exercised, not just a hand-rolled source chain.
        run: bash lkf.sh remix --file remix.toml --dry-run

  tkg-fetch-validate:
    name: tkg patch fetch (6.12)
    runs-on: ubuntu-24.04

    env:
      # Authenticates GitHub API calls in patches/fetch.sh to avoid the
      # 60 req/hour anonymous rate limit (raises it to 5000/hour).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Install fetch dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates jq

      - name: Fetch tkg patches for 6.12
        # --dir sets PATCHES_DIR; fetch_tkg saves into ${PATCHES_DIR}/tkg/
        run: bash patches/fetch.sh --version 6.12 --set tkg --dir patches

      - name: Verify at least one patch was fetched
        run: |
          count=$(find patches/tkg -name '*.patch' | wc -l)
          echo "Fetched ${count} tkg patches"
          [[ "${count}" -gt 0 ]] || { echo "No patches fetched"; exit 1; }

      - name: Verify bore patch present
        run: ls patches/tkg/*bore*.patch || { echo "bore patch missing"; exit 1; }
